<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignments</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>

<div class="container mt-5">
  <h3>Assignments</h3>

  {% if assignments %}

    {% for a in assignments %}

    <!-- 🔥 FINAL SAFE ID -->
    {% set aid = a.id | int %}
    {% set sub = submissions.get(aid) %}

    <div class="card p-3 mb-3">
      <h5>{{ a.title }}</h5>
      <p>{{ a.description }}</p>

      {% if sub %}
        <div class="alert alert-success">
          Submitted: {{ sub.answer }}
        </div>
      {% else %}
        <form method="post" action="/student/assignments/submit">
          <input type="hidden" name="assignment_id" value="{{ aid }}">
          <textarea name="answer" class="form-control mb-2" required></textarea>
          <button class="btn btn-primary">Submit</button>
        </form>
      {% endif %}
    </div>

    {% endfor %}

  {% else %}
    <p>No assignments found</p>
  {% endif %}

</div>

</body>
</html>
